@if (!isAuthRoute()) {
  <!-- Contenedor Principal: Ocupa toda la pantalla y es el padre de todo -->
  <div class="flex flex-col h-screen bg-gris-claro overflow-hidden">

    <!-- HEADER: Fijo arriba -->
    <header class="h-16 bg-nieve shadow-sm flex items-center justify-between px-4 z-20 shrink-0">
      <div class="flex items-center gap-2">
        <span class="text-2xl" role="img" aria-label="Pastelería">🍰</span>
        <h1 class="font-bold text-gris-oscuro text-lg">Mi Pastelería</h1>
      </div>
      <button (click)="logout()" class="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
        </svg>
      </button>
    </header>

    <!-- CONTENIDO DINÁMICO: Aquí vive tu Dashboard, Historial, etc.
         Usamos flex-1 para que ocupe todo el espacio central.
         pb-24 crea el espacio necesario para que la barra inferior no tape nada. -->
    <div class="flex-1 overflow-y-auto pb-32">
      <router-outlet></router-outlet>
    </div>

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="shrink-0 fixed bottom-0 left-0 w-full h-16 bg-nieve border-t border-gray-200 z-50 flex items-center px-2 pb-safe">

      <!-- IZQUIERDA (2 botones) -->
      <div class="flex-1 flex justify-around">
        <button (click)="irA('dashboard')" class="flex flex-col items-center p-2 text-gray-500 hover:text-cereza transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
          <span class="text-[10px] font-bold">Inicio</span>
        </button>

        <button (click)="irA('historial')" class="flex flex-col items-center p-2 text-gray-500 hover:text-cereza transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
          <span class="text-[10px] font-bold">Dashboard</span>
        </button>
      </div>

      <!-- CENTRO (Botón Protagonista) -->
      <div class="relative w-16">
        <button (click)="irA('pos')" class="absolute -top-10 left-0 bg-cereza text-nieve w-16 h-16 rounded-full flex items-center justify-center shadow-lg shadow-red-200 border-4 border-gris-claro transition-transform active:scale-95 z-50">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-9 h-9"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        </button>
      </div>

      <!-- DERECHA (2 botones) -->
      <div class="flex-1 flex justify-around">
        <button (click)="irA('compras')" class="flex flex-col items-center p-2 text-gray-500 hover:text-cereza transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" /></svg>
          <span class="text-[10px] font-bold">Compras</span>
        </button>

        <button (click)="irA('gestion')" class="flex flex-col items-center p-2 text-gray-500 hover:text-cereza transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M10.343 3.94c.09-.542.561-.94 1.114-.94h1.086c.553 0 1.024.398 1.114.94l.032.193c.045.27.27.472.547.472h.083c.536 0 1.077.065 1.604.193.267.063.535-.046.69-.267l.115-.164c.324-.465.945-.606 1.424-.316l.542.33c.48.29.637.915.343 1.38l-.112.181c-.139.224-.132.502.019.72.35.503.621 1.049.805 1.631.066.208.261.348.477.348h.209c.552 0 1.002.449 1.002 1.002v1.086c0 .553-.45 1.002-1.002 1.002h-.209c-.216 0-.411.14-.477.348-.184.582-.455 1.128-.805 1.631-.151.218-.158.496-.019.72l.112.181c.294.465.137.99-.343 1.38l-.542.33c-.479.29-1.1.149-1.424-.316l-.115-.164c-.155-.221-.423-.33-.69-.267-.527.128-1.068.193-1.604.193h-.083c-.277 0-.502.202-.547.472l-.032.193c-.09.542-.561.94-1.114.94h-1.086c-.553 0-1.024-.398-1.114-.94l-.032-.193c-.045-.27-.27-.472-.547-.472h-.083c-.536 0-1.077-.065-1.604-.193-.267-.063-.535.046-.69.267l-.115.164c-.324.465-.945.606-1.424.316l-.542-.33c-.48-.29-.637-.915-.343-1.38l.112-.181c.139-.224.132-.502-.019-.72a5.986 5.986 0 0 1-.805-1.631c-.066-.208-.261-.348-.477-.348h-.209c-.552 0-1.002-.449-1.002-1.002V9.897c0-.553.45-1.002 1.002-1.002h.209c.216 0 .411-.14.477-.348.184-.582.455-1.128.805-1.631.151-.218.158-.496.019-.72l-.112-.181c-.294-.465-.137-.99.343-1.38l.542-.33c.479-.29 1.1-.149 1.424.316l.115.164c.155.221.423.33.69.267.527-.128 1.068-.193 1.604-.193h.083c.277 0 .502-.202.547-.472l.032-.193Z" /></svg>
          <span class="text-[10px] font-bold">Gestión</span>
        </button>
      </div>
    </nav>
  </div>
} @else {
  <router-outlet></router-outlet>
}
