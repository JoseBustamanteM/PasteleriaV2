<div class="p-4 pb-32">
  <h1 class="text-2xl font-black text-gray-800 mb-2">Centro de Gestión</h1>
  <p class="text-sm text-gray-500 mb-6">Administra los catálogos y opciones de tu negocio.</p>

  <div class="grid grid-cols-2 gap-4">

    <button (click)="abrirSeccion('catalogo')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center hover:bg-red-50 active:scale-95 transition-all">
      <span class="text-4xl mb-2">🍰</span>
      <h3 class="font-bold text-gray-800">Productos</h3>
      <p class="text-[10px] text-gray-400 mt-1">Crear, editar, precios</p>
    </button>

    <button (click)="abrirSeccion('clientes')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center hover:bg-blue-50 active:scale-95 transition-all">
      <span class="text-4xl mb-2">👥</span>
      <h3 class="font-bold text-gray-800">Clientes</h3>
      <p class="text-[10px] text-gray-400 mt-1">Directorio y deudas</p>
    </button>

    <button (click)="abrirSeccion('metodos-pago')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center hover:bg-green-50 active:scale-95 transition-all">
      <span class="text-4xl mb-2">💳</span>
      <h3 class="font-bold text-gray-800">Métodos Pago</h3>
      <p class="text-[10px] text-gray-400 mt-1">Efectivo, Transf, etc.</p>
    </button>



  </div>
</div>
