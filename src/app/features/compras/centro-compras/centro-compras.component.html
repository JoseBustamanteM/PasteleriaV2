<div class="p-4 pb-32">
  <h1 class="text-2xl font-black text-gray-800 mb-2">Abastecimiento</h1>
  <p class="text-sm text-gray-500 mb-6">Gestiona tus insumos, activos y pagos a proveedores.</p>

  <div class="grid grid-cols-2 gap-4">

    <button (click)="abrirSeccion('insumos')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center hover:bg-orange-50 active:scale-95 transition-all">
      <span class="text-4xl mb-2">🌾</span>
      <h3 class="font-bold text-gray-800">Insumos</h3>
      <p class="text-[10px] text-gray-400 mt-1">Harina, huevos, cajas</p>
    </button>

    <button (click)="abrirSeccion('proveedores')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center hover:bg-blue-50 active:scale-95 transition-all">
      <span class="text-4xl mb-2">🚚</span>
      <h3 class="font-bold text-gray-800">Proveedores</h3>
      <p class="text-[10px] text-gray-400 mt-1">Contactos y empresas</p>
    </button>

    <button (click)="abrirSeccion('activos')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center hover:bg-purple-50 active:scale-95 transition-all">
      <span class="text-4xl mb-2">📠</span>
      <h3 class="font-bold text-gray-800">Activos Fijos</h3>
      <p class="text-[10px] text-gray-400 mt-1">Hornos, vitrinas, etc.</p>
    </button>

    <button (click)="abrirSeccion('historial-compras')" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center hover:bg-red-50 active:scale-95 transition-all">
      <span class="text-4xl mb-2">🧾</span>
      <h3 class="font-bold text-gray-800">Nueva Compra</h3>
      <p class="text-[10px] text-gray-400 mt-1">Registrar gastos</p>
    </button>

  </div>
</div>
