<div class="p-4 max-w-2xl mx-auto pb-24">
  <h1 class="text-xl font-black text-gray-800 mb-4">Historial de Ventas</h1>

  <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 grid grid-cols-2 gap-2 mb-4 text-xs">
    <input type="date" [(ngModel)]="desde" class="p-2 border border-gray-200 rounded-lg" title="Desde">
    <input type="date" [(ngModel)]="hasta" class="p-2 border border-gray-200 rounded-lg" title="Hasta">

    <select [(ngModel)]="estado" class="p-2 border border-gray-200 rounded-lg">
      <option value="">Estado: Todos</option>
      <option value="Pagado">Pagado</option>
      <option value="Pendiente">Pendiente</option>
    </select>
    <select [(ngModel)]="producto_id" class="p-2 border border-gray-200 rounded-lg">
      <option value="">Producto: Todos</option>
      @for (p of productos(); track p.id) { <option [value]="p.id">{{ p.nombre }}</option> }
    </select>
    <select [(ngModel)]="cliente_id" class="p-2 border border-gray-200 rounded-lg">
      <option value="">Cliente: Todos</option>
      @for (c of clientes(); track c.id) { <option [value]="c.id">{{ c.nombre_completo }}</option> }
    </select>
    <select [(ngModel)]="metodo_pago_id" class="p-2 border border-gray-200 rounded-lg">
      <option value="">Pago: Todos</option>
      @for (m of metodosPago(); track m.id) { <option [value]="m.id">{{ m.nombre }}</option> }
    </select>

    <button (click)="buscar()" class="col-span-2 bg-gray-800 text-white font-bold py-3 rounded-xl mt-2">Filtrar Historial</button>
  </div>

  <div class="space-y-3">
    @if (cargando()) { <p class="text-center text-gray-400 text-sm">Buscando...</p> }
    @for (venta of ventas(); track venta.id) {
      <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex justify-between items-center">
        <div>
          <p class="font-bold text-sm text-gray-800">{{ venta.producto?.nombre }}</p>
          <p class="text-[10px] text-gray-400">{{ venta.fecha | date:'dd/MM/yyyy' }} - {{ venta.cliente?.nombre_completo || 'General' }}</p>
        </div>
        <div class="text-right">
          <p class="font-bold text-sm">{{ venta.precio_total | currency:'CLP':'symbol-narrow':'1.0-0' }}</p>
          <button (click)="editarVenta(venta)" class="text-[10px] bg-blue-50 text-blue-700 px-2 py-1 rounded font-bold">EDITAR</button>
        </div>
      </div>
    }
  </div>
</div>
